services:
  - type: web
    name: sm-clone
    runtime: docker
    plan: starter
    dockerfilePath: ./Dockerfile
    healthCheckPath: /healthz
    envVars:
      - key: DATA_DIR
        value: /data
      - key: ADMIN_USERNAME
        sync: false
      - key: ADMIN_PASSWORD
        sync: false
    disk:
      name: app-data
      mountPath: /data
      sizeGB: 10
